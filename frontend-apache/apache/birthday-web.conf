<VirtualHost *:80>
    ServerName birthday-web.local
    DocumentRoot /var/www/birthday-web

    <Directory /var/www/birthday-web>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog /var/log/httpd/birthday-web-error.log
    CustomLog /var/log/httpd/birthday-web-access.log combined
</VirtualHost>
